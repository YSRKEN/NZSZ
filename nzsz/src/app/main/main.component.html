<h1 class="text-center my-1vh font-size-vh-5" (click)="showVersionInfo()">にじさんじ</h1>
<div class="my-1vh">
  <app-calendar date="{{Today | date: 'yyyy-MM-dd'}}" (onTap)="onTap($event)"></app-calendar>
</div>
@if (LiveInfoList.length > 0 && !ProgressSpinnerFlg) {
  <mat-list class="overflow-auto vh-42 my-1vh w-100"
    >
    @for (liveInfo of LiveInfoList; track liveInfo) {
      <mat-list-item>
        <div class="w-20" (click)="setTimer(liveInfo)">
          {{liveInfo.date | date: 'HH:mm'}}
        </div>
        <div class="w-80">
          <div class="text-overflow w-100" (click)="jumpOtherPage(liveInfo.url)">
            {{liveInfo.site}}
          </div>
          <div class="text-overflow w-100" (click)="jumpOtherPage(liveInfo.url)">
            {{liveInfo.youtuber}}
          </div>
        </div>
      </mat-list-item>
    }
  </mat-list>
}
@if (ProgressSpinnerFlg) {
  <div class="vh-42 w-100 overflow-auto">
    <mat-spinner mode="indeterminate" class="mx-auto" style="margin-top:20%"></mat-spinner>
  </div>
}
@if (LiveInfoList.length == 0 && !ProgressSpinnerFlg) {
  <p class="vh-42 my-1vh w-100 text-center line-vh-42 font-size-vh-4"
    >
    配信予定はありません。
  </p>
}
<div class="my-2vh text-center">
  <button mat-raised-button color="primary" class="mr-2vw my-1vh min-width-0 vh-6 font-size-vh-2"
  (click)="jumpNzSzSite()">公式</button>
  <button mat-raised-button color="primary" class="mx-2vw my-1vh min-width-0 vh-6 font-size-vh-2"
  (click)="jumpNzSzLive()">ライブ</button>
  <button mat-raised-button color="primary" class="mx-2vw my-1vh min-width-0 vh-6 font-size-vh-2"
    (click)="navigateTimer()">
  タイマー</button>
  <button mat-raised-button color="primary" class="ml-2vw my-1vh min-width-0 vh-6 font-size-vh-2"
    (click)="navigateOption()">
  設定</button>
</div>
